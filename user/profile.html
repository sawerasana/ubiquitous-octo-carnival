<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PeshoX Intelligence | Profile Hub</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="profile.css">
    <script src="/assets/js/global.js" defer></script>
    <script src="profile.js" defer></script>
</head>
<body>
    <div class="main-content profile-container">
        <!-- Wallet Card -->
        <div class="wallet-card">
            <div class="wallet-icon">
                <i class="fas fa-wallet"></i>
            </div>
            <div class="wallet-info">
                <div class="bilingual">
                    <span class="english-text">Total Earnings</span>
                    <span class="urdu-text">کل آمدنی</span>
                </div>
                <div class="wallet-balance" id="walletBalance">0 PKR</div>
                <div class="bilingual">
                    <span class="english-text"> Balance </span>
                    <span class="urdu-text"> بیلنس </span>
                </div>
            </div>
        </div>

        <!-- VIP Timer Card -->
        <div class="timer-card">
            <h3><i class="fas fa-hourglass-half"></i> Subscription Status</h3>
            <div class="plan-name" id="planName">Free</div>
            <div class="timer-display" id="timerDisplay">Inactive</div>
            <div class="progress-ring-timer">
                <canvas id="timerCanvas" width="70" height="70"></canvas>
            </div>
        </div>

        <!-- Account Settings -->
        <div class="settings-card">
            <h2><i class="fas fa-sliders-h"></i> Account Settings</h2>
            <div class="form-group">
                <label><i class="fas fa-user"></i> First Name</label>
                <input type="text" id="firstNameInput" placeholder="First Name">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Last Name</label>
                <input type="text" id="lastNameInput" placeholder="Last Name">
            </div>
            <div class="form-group">
                <label><i class="fas fa-gamepad"></i> Aviator Platform</label>
                <select id="aviatorSelect" class="platform-select">
                    <!-- Populated by JS -->
                </select>
            </div>
            <button id="saveChangesBtn" class="btn-primary"><i class="fas fa-save"></i> SAVE CHANGES</button>
            <button id="copyIdKeyBtn" class="btn-secondary"><i class="fas fa-copy"></i> COPY ID KEY</button>
        </div>

        <!-- Navigation Buttons (with new VIP Plans and Withdraw) -->
        <div class="nav-buttons">
            <button id="vipPlansBtn" class="btn-primary"><i class="fas fa-crown"></i> VIP PLANS</button>
            <button id="withdrawBtn" class="btn-danger"><i class="fas fa-money-bill-wave"></i> WITHDRAW WALLET FUNDS</button>
            <button id="logoutBtn" class="btn-danger"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        </div>
    </div>

    <!-- Centered confirmation modal for logout -->
    <div id="logoutModal" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <h3><i class="fas fa-question-circle"></i> Confirm Logout</h3>
            <div class="bilingual">
                <span class="english-text">Are you sure you want to logout?</span>
                <span class="urdu-text">کیا آپ واقعی لاگ آؤٹ کرنا چاہتے ہیں؟</span>
            </div>
            <div class="modal-buttons">
                <button id="logoutCancelBtn" class="btn-secondary">Cancel</button>
                <button id="logoutConfirmBtn" class="btn-primary">Logout</button>
            </div>
        </div>
    </div>
</body>
</html>
